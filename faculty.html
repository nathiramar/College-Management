<!DOCTYPE html>
<html>
<head>
<title>Staff Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:url("https://png.pngtree.com/thumb_back/fw800/background/20241210/pngtree-aerial-view-of-a-vibrant-and-modern-college-campus-featuring-architecture-image_16736726.jpg") no-repeat center center fixed;
    background-size:cover;
}

.login-box{
    width:400px;
    background:rgba(255,255,255,0.9);
    margin:60px auto;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px black;
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
}

h2{
    color:#0b3d91;
    margin:15px 0;
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    font-size:17px;
    border:1px solid gray;
    border-radius:5px;
}

.links{
    display:flex;
    justify-content:space-between;
    margin:10px 0 20px;
}

.links a{
    text-decoration:none;
    color:#0b3d91;
    font-size:15px;
    font-weight:bold;
}

.links a:hover{
    color:orange;
    text-decoration:underline;
}

button{
    width:100%;
    padding:12px;
    background:#0b3d91;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:orange;
}

p{
    margin-top:20px;
    font-size:14px;
}

</style>

</head>

<body>

<div class="login-box">

<img class="logo"
src="https://static.vecteezy.com/system/resources/previews/009/634/761/non_2x/vsn-letter-logo-design-with-polygon-shape-vsn-polygon-and-cube-shape-logo-design-vsn-hexagon-logo-template-white-and-black-colors-vsn-monogram-business-and-real-estate-logo-vector.jpg">

<h2>Staff Login</h2>

<form action="staff_dashboard.html">

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<div class="links">

<a href="forgotpassword.html">Forgot Password?</a>

<a href="signup.html">Sign Up</a>

</div>

<button type="submit">Login</button>

</form>

<p>© 2026 VSN College of Engineering & Technology</p>

</div>

</body>
</html>
