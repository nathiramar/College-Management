<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f8fc;
}

.box{
    width:450px;
    background:white;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

h2{
    color:#0b3d91;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:1px solid gray;
    border-radius:5px;
    font-size:16px;
}

button{
    width:95%;
    padding:12px;
    background:#0b3d91;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
}

button:hover{
    background:orange;
}

a{
    text-decoration:none;
    color:#0b3d91;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Staff ID / Student ID / Parent ID">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button>Create Account</button>

<br><br>

<a href="faculty.html">Already have an account? Login</a>

</div>

</body>
</html>
