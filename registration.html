<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f8fc;
}

h1{
    color:#0b3d91;
    margin-top:20px;
}

hr{
    width:90%;
    border:1px solid #0b3d91;
}

.menu{
    margin:20px;
}

.menu a{
    text-decoration:none;
    color:white;
    background:#0b3d91;
    padding:10px 20px;
    margin:5px;
    border-radius:5px;
    font-weight:bold;
}

.menu a:hover{
    background:orange;
}

form{
    width:400px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px lightgray;
    text-align:left;
}

label{
    font-weight:bold;
    color:#0b3d91;
}

input[type=text],
input[type=email],
select,
textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid gray;
    border-radius:5px;
    font-size:16px;
}

input[type=radio]{
    margin-top:10px;
}

input[type=submit],
input[type=reset]{
    background:#0b3d91;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    margin-right:10px;
}

input[type=submit]:hover,
input[type=reset]:hover{
    background:orange;
}

footer{
    background:#0b3d91;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}

</style>

</head>

<body>

<center>

<h1>Student Registration</h1>

<hr>

<div class="menu">

<a href="index.html">Home</a>

<a href="about.html">About Us</a>

<a href="courses.html">Courses</a>
<a href="gallery.html">Gallery</a>
<a href="privacy.html">Privacy Policy</a>

<a href="contact.html">Contact</a>

</div>

<hr>

<form>

<label>Name</label><br>
<input type="text" placeholder="Enter your name">

<label>Register Number</label><br>
<input type="text" placeholder="Enter register number">

<label>Gender</label><br>

<input type="radio" name="g"> Male
<input type="radio" name="g"> Female

<br><br>

<label>Department</label><br>

<select>
<option>Select Department</option>
<option>Computer Science Engineering</option>
<option>Artificial Intelligence & Data Science</option>
<option>Electronics & Communication Engineering</option>
<option>Biotechnology</option>
<option>Electrical & Electronics Engineering</option>
<option>Mechanical Engineering</option>
<option>Civil Engineering</option>
</select>

<label>Email</label><br>
<input type="email" placeholder="Enter email">

<label>Phone</label><br>
<input type="text" placeholder="Enter phone number">

<label>Address</label><br>

<textarea rows="5" placeholder="Enter address"></textarea>

<br>

<center>

<input type="submit" value="Register">

<input type="reset" value="Reset">

</center>

</form>

<footer>

<p>© 2026 VSN College of Engineering & Technology</p>

<p>All Rights Reserved</p>

</footer>

</center>

</body>
</html>
